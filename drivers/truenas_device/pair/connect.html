<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      padding: 24px;
      color: #1a1a1a;
      background: transparent;
    }

    h2 {
      font-size: 18px;
      font-weight: 600;
      margin: 0 0 6px 0;
    }

    p.hint {
      font-size: 13px;
      color: #666;
      margin: 0 0 24px 0;
    }

    .field {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 6px;
      color: #333;
    }

    input {
      width: 100%;
      box-sizing: border-box;
      padding: 10px 12px;
      font-size: 14px;
      border: 1px solid #ddd;
      border-radius: 8px;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus {
      border-color: #E1261C;
    }

    .error {
      display: none;
      margin-top: 12px;
      padding: 10px 12px;
      background: #fff0f0;
      border: 1px solid #f5c6c6;
      border-radius: 8px;
      font-size: 13px;
      color: #c0392b;
    }

    button {
      margin-top: 8px;
      width: 100%;
      padding: 12px;
      background: #E1261C;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <h2>Connect to TrueNAS</h2>
  <p class="hint">Enter the IP address or hostname of your TrueNAS system and an API key.</p>

  <div class="field">
    <label for="host">Host (IP address or hostname)</label>
    <input id="host" type="text" placeholder="192.168.1.100" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" />
  </div>

  <div class="field">
    <label for="apikey">API Key</label>
    <input id="apikey" type="password" placeholder="Paste your TrueNAS API key" />
  </div>

  <div class="error" id="error"></div>

  <button id="btn">Connect</button>

  <script>
    const hostInput = document.getElementById('host');
    const apikeyInput = document.getElementById('apikey');
    const btn = document.getElementById('btn');
    const errorEl = document.getElementById('error');

    function showError(msg) {
      errorEl.textContent = msg;
      errorEl.style.display = 'block';
    }

    function hideError() {
      errorEl.style.display = 'none';
    }

    btn.addEventListener('click', async () => {
      const host = hostInput.value.trim();
      const apiKey = apikeyInput.value.trim();

      hideError();

      if (!host) {
        showError('Please enter a host or IP address.');
        return;
      }
      if (!apiKey) {
        showError('Please enter an API key.');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Connecting…';

      try {
        await Homey.emit('connect', { host, apiKey });
        Homey.nextView();
      } catch (err) {
        showError(err.message || 'Could not connect to TrueNAS. Check host and API key.');
        btn.disabled = false;
        btn.textContent = 'Connect';
      }
    });
  </script>
</body>
</html>
